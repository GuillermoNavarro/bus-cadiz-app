<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horario M10 HUPM</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Bus HUPM">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>

    <div class="container my-4">
        
        <header class="text-center mb-4">
            <h1 class="display-6 fw-bold text-primary">Ruta M10 / M11 HUPM</h1>
        </header>

        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                
                <div class="card shadow-sm p-3 mb-4 bg-body rounded">
                    
                    <div class="input-group mb-3">
                        <input id="origen" class="form-control text-center" type="text" value="San Fernando" readonly>
                        <button id="cambioRuta" class="btn btn-primary px-3" type="button">⇄</button>
                        <input id="destino" class="form-control text-center" type="text" value="Cádiz" readonly>
                    </div>

                    <div class="d-flex justify-content-center mb-3">
                        <div id="lineas" class="btn-group" role="group" aria-label="Selección de lineas">
                            <input class="btn-check" id="checkM10" type="checkbox" value="2" checked>
                            <label class="btn btn-outline-primary px-4" for="checkM10">M-10</label>
                            
                            <input class="btn-check" id="checkM11" type="checkbox" value="3">
                            <label class="btn btn-outline-primary px-4" for="checkM11">M-11</label>
                        </div>
                    </div>

                    <div class="row g-2 align-items-end">
                        <div class="col-4">
                            <label for="dia" class="form-label small text-muted mb-1">Fecha:</label>
                            <input type="date" id="dia" class="form-control">
                        </div>
                        <div class="col-4">
                            <label for="hora" class="form-label small text-muted mb-1">Hora:</label>
                            <input type="time" id="hora" class="form-control">
                        </div>
                        <div class="col-4">
                            <button id="actualizar" class="btn btn-outline-secondary w-100">Actualizar</button>
                        </div>
                    </div>

                </div> 
                <div id="msg_error" class="text-danger text-center fw-bold mb-3"></div>
                <div class="table-responsive">
                    <table id="tabla-resultados" class="table table-striped table-hover align-middle"></table>
                </div>
            </div>
        </div>
    </div> 
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
            .then(() => console.log('Service Worker registrado con éxito.'))
            .catch(err => console.error('Fallo al registrar el SW:', err));
        }
    </script>
</body>
</html>
